<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turbo Cups — NOVA ARCADE</title>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('nova-theme')||'dark')}catch(e){}</script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/theme.css">
<link rel="stylesheet" href="../../css/game.css">
<style>
  .kart-stage { position: relative; width: 100%; max-width: 900px; }
  #cv { width: 100%; height: auto; display:block; background:#1a2740; border-radius:var(--radius); }
  .khud { position:absolute; inset:0; pointer-events:none; z-index:6; font-family:var(--font-display); }
  .k-lap { position:absolute; top:10px; left:14px; background:color-mix(in srgb,var(--bg) 55%,transparent); border:1px solid var(--border); border-radius:10px; padding:6px 12px; }
  .k-lap b { font-size:26px; color:var(--accent); } .k-lap small{ font-size:11px; color:var(--text-dim); letter-spacing:1px; display:block; }
  .k-pos { position:absolute; top:10px; right:14px; background:color-mix(in srgb,var(--bg) 55%,transparent); border:1px solid var(--border); border-radius:10px; padding:4px 14px; text-align:center; }
  .k-pos b { font-size:34px; color:#ffd23b; } .k-pos sup{ font-size:14px; } .k-pos small{ font-size:10px; color:var(--text-dim); display:block; letter-spacing:1px; }
  .k-speed { position:absolute; bottom:12px; right:16px; text-align:right; }
  .k-speed b { font-size:40px; color:#fff; text-shadow:0 2px 8px #000; } .k-speed small{ font-size:12px; color:var(--text-dim); }
  .k-item { position:absolute; bottom:14px; left:16px; width:74px; height:74px; border-radius:14px; border:2px solid var(--border);
            background:color-mix(in srgb,var(--bg) 55%,transparent); display:grid; place-items:center; font-size:40px; }
  .k-item.flash { animation:itemflash .12s linear infinite; }
  @keyframes itemflash { 0%{border-color:#ff3b51} 50%{border-color:#ffd23b} 100%{border-color:#3bff7b} }
  .k-item .hint { position:absolute; bottom:-18px; left:50%; transform:translateX(-50%); font-size:10px; color:var(--text-dim); white-space:nowrap; }
  .k-drift { position:absolute; bottom:96px; left:16px; width:74px; height:8px; border-radius:5px; background:rgba(255,255,255,.15); overflow:hidden; }
  .k-drift i { display:block; height:100%; width:0%; background:#3bff7b; transition:width .05s linear; }
  #kmini { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); background:color-mix(in srgb,var(--bg) 60%,transparent); border:1px solid var(--border); border-radius:10px; }
  .k-count { position:absolute; inset:0; display:grid; place-items:center; z-index:7; pointer-events:none; }
  .k-count b { font-family:'Bungee',sans-serif; font-size:90px; color:#fff; text-shadow:0 4px 16px #000; opacity:0; }
  .lock-hint { position:absolute; left:50%; bottom:70px; transform:translateX(-50%); z-index:6; pointer-events:none; font-size:12px; color:var(--text-dim); background:color-mix(in srgb,var(--bg) 55%, transparent); padding:4px 10px; border-radius:8px; }
</style>
</head>
<body>
  <div class="arcade-topbar">
    <a class="btn" href="../../index.html">← Volver</a>
    <span class="brand">TURBO CUPS</span>
    <span class="spacer"></span>
    <div id="nova-gear-host"></div>
  </div>
  <main class="game-main">
    <div class="stage kart-stage">
      <canvas id="cv" width="900" height="520"></canvas>
      <div class="khud">
        <div class="k-lap"><b><span id="lap">1</span>/3</b><small>VUELTA</small></div>
        <div class="k-pos"><b id="pos">1</b><sup id="posSup">º</sup><br><small>de <span id="np">4</span></small></div>
        <div class="k-speed"><b id="speed">0</b> <small>KM/H</small></div>
        <div class="k-item" id="itemBox">—<div class="hint">E / Ctrl: usar</div></div>
        <div class="k-drift"><i id="driftFill"></i></div>
        <div class="k-count"><b id="count"></b></div>
      </div>
      <canvas id="kmini" width="150" height="150"></canvas>
      <div class="lock-hint" id="lockHint">↑ acelerar · ←→ girar · ESPACIO derrape · E ítem</div>
      <div class="overlay show" id="ov"><div class="box">
        <h2 id="ov-title">TURBO CUPS</h2>
        <p id="ov-msg">↑/W acelerar · ↓/S frenar · ←→ girar · ESPACIO derrapar (suelta para mini-turbo) · E usar ítem.<br>3 vueltas. Atraviesa las cajas para conseguir ítems. ¡Llega 1º!</p>
        <button class="btn btn-accent" id="ov-btn">🏁 Carrera</button>
      </div></div>
    </div>
    <div class="controls-row"><button class="btn" id="restart">↻ Reiniciar</button></div>
  </main>
  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
  } }
  </script>
  <script src="../../js/theme.js"></script>
  <script src="../../js/audio.js"></script>
  <script src="../../js/settings.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
