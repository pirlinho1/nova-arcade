<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damas — NOVA ARCADE</title>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('nova-theme')||'dark')}catch(e){}</script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/theme.css">
<link rel="stylesheet" href="../../css/game.css">
</head>
<body>
  <div class="arcade-topbar">
    <a class="btn" href="../../index.html">← Volver</a>
    <span class="brand">DAMAS</span>
    <span class="spacer"></span>
    <div id="nova-gear-host"></div>
  </div>
  <main class="game-main">
    <div class="hud">
      <div class="stat"><b id="turn">TÚ</b><span>Turno</span></div>
      <div class="stat"><b id="pcount">12</b><span>Tus fichas</span></div>
      <div class="stat"><b id="acount">12</b><span>IA</span></div>
    </div>
    <div class="stage">
      <canvas id="cv" width="480" height="480"></canvas>
      <div class="overlay show" id="ov"><div class="box">
        <h2 id="ov-title">DAMAS</h2>
        <p id="ov-msg">Mueve en diagonal. Captura saltando. Captura obligatoria. Corona en el fondo.</p>
        <button class="btn btn-accent" id="ov-btn">▶ Jugar</button>
      </div></div>
    </div>
    <div class="controls-row"><button class="btn" id="restart">↻ Nueva partida</button></div>
  </main>
  <script src="../../js/theme.js"></script>
  <script src="../../js/audio.js"></script>
  <script src="../../js/settings.js"></script>
  <script src="game.js"></script>
</body>
</html>
