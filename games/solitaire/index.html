<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solitario — NOVA ARCADE</title>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('nova-theme')||'dark')}catch(e){}</script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/theme.css">
<link rel="stylesheet" href="../../css/game.css">
</head>
<body>
  <div class="arcade-topbar">
    <a class="btn" href="../../index.html">← Volver</a>
    <span class="brand">SOLITARIO</span>
    <span class="spacer"></span>
    <div id="nova-gear-host"></div>
  </div>
  <main class="game-main">
    <div class="hud">
      <div class="stat"><b id="moves">0</b><span>Movimientos</span></div>
      <div class="stat"><b id="found">0/52</b><span>Fundaciones</span></div>
      <div class="stat"><b id="time">0:00</b><span>Tiempo</span></div>
    </div>
    <div class="stage" style="width:min(680px,96vw)">
      <canvas id="cv" width="672" height="460"></canvas>
      <div class="overlay show" id="ov"><div class="box">
        <h2 id="ov-title">SOLITARIO</h2>
        <p id="ov-msg">Klondike. Clic en el mazo para robar. Clic carta → destino. Sube los palos de As a Rey.</p>
        <button class="btn btn-accent" id="ov-btn">▶ Jugar</button>
      </div></div>
    </div>
    <div class="controls-row"><button class="btn" id="auto">⚡ Auto-fundación</button><button class="btn" id="restart">↻ Nuevo</button></div>
  </main>
  <script src="../../js/theme.js"></script>
  <script src="../../js/audio.js"></script>
  <script src="../../js/settings.js"></script>
  <script src="game.js"></script>
</body>
</html>
