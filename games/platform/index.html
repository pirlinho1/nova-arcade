<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jump Quest — NOVA ARCADE</title>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('nova-theme')||'dark')}catch(e){}</script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/theme.css">
<link rel="stylesheet" href="../../css/game.css">
</head>
<body>
  <div class="arcade-topbar">
    <a class="btn" href="../../index.html">← Volver</a>
    <span class="brand">JUMP QUEST</span>
    <span class="spacer"></span>
    <div id="nova-gear-host"></div>
  </div>
  <main class="game-main">
    <div class="hud">
      <div class="stat"><b id="coins">0</b><span>Monedas</span></div>
      <div class="stat"><b id="lives">3</b><span>Vidas</span></div>
      <div class="stat"><b id="lvl">1</b><span>Nivel</span></div>
    </div>
    <div class="stage">
      <canvas id="cv" width="640" height="360"></canvas>
      <div class="overlay show" id="ov"><div class="box">
        <h2 id="ov-title">JUMP QUEST</h2>
        <p id="ov-msg">← → moverte, ESPACIO/↑ saltar. Salta sobre enemigos, junta monedas, llega a la bandera.</p>
        <button class="btn btn-accent" id="ov-btn">▶ Jugar</button>
      </div></div>
    </div>
    <div class="controls-row"><button class="btn" id="restart">↻ Reiniciar</button></div>
    <div class="dpad" id="dpad">
      <button class="btn icon-btn left" data-k="left" style="grid-column:1;grid-row:1">◀</button>
      <button class="btn icon-btn right" data-k="right" style="grid-column:2;grid-row:1">▶</button>
      <button class="btn icon-btn jump" data-k="jump" style="grid-column:3;grid-row:1;font-size:14px">⤒</button>
    </div>
  </main>
  <script src="../../js/theme.js"></script>
  <script src="../../js/audio.js"></script>
  <script src="../../js/settings.js"></script>
  <script src="game.js"></script>
</body>
</html>
