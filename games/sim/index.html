<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sim Lab — NOVA ARCADE</title>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('nova-theme')||'dark')}catch(e){}</script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/theme.css">
<link rel="stylesheet" href="../../css/game.css">
<style>
  .tools { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .tool { padding:8px 12px; border:2px solid var(--border); border-radius:10px; background:var(--surface-2); cursor:pointer; font-size:13px; display:flex; align-items:center; gap:6px; }
  .tool.sel { border-color:var(--accent); box-shadow:0 0 12px color-mix(in srgb,var(--accent) 50%,transparent); }
  .tool .sw { width:14px; height:14px; border-radius:3px; }
  #cv { cursor:crosshair; }
</style>
</head>
<body>
  <div class="arcade-topbar">
    <a class="btn" href="../../index.html">← Volver</a>
    <span class="brand">SIM LAB</span>
    <span class="spacer"></span>
    <div id="nova-gear-host"></div>
  </div>
  <main class="game-main">
    <div class="tools" id="tools"></div>
    <div class="stage">
      <canvas id="cv" width="320" height="220" style="width:640px;image-rendering:pixelated"></canvas>
      <div class="overlay show" id="ov"><div class="box">
        <h2 id="ov-title">SIM LAB</h2>
        <p id="ov-msg">Laboratorio de física con partículas. Elige un material y dibuja: la arena cae, el agua fluye, el fuego quema la planta, la piedra no se mueve. ¡Experimenta!</p>
        <button class="btn btn-accent" id="ov-btn">▶ Entrar</button>
      </div></div>
    </div>
    <div class="controls-row">
      <button class="btn" id="clear">🧹 Limpiar</button>
      <label style="display:flex;align-items:center;gap:6px;color:var(--text-dim);font-size:13px">Pincel <input type="range" id="brush" min="1" max="8" value="3" style="width:90px"></label>
    </div>
  </main>
  <script src="../../js/theme.js"></script>
  <script src="../../js/audio.js"></script>
  <script src="../../js/settings.js"></script>
  <script src="game.js"></script>
</body>
</html>
