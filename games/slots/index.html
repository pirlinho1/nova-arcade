<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Spin — NOVA ARCADE</title>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('nova-theme')||'dark')}catch(e){}</script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/theme.css">
<link rel="stylesheet" href="../../css/game.css">
</head>
<body>
  <div class="arcade-topbar">
    <a class="btn" href="../../index.html">← Volver</a>
    <span class="brand">LUCKY SPIN</span>
    <span class="spacer"></span>
    <div id="nova-gear-host"></div>
  </div>
  <main class="game-main">
    <div class="hud">
      <div class="stat"><b id="credits">100</b><span>Créditos</span></div>
      <div class="stat"><b id="bet">5</b><span>Apuesta</span></div>
      <div class="stat"><b id="lastwin">0</b><span>Última ganancia</span></div>
    </div>
    <div class="stage">
      <canvas id="cv" width="560" height="360"></canvas>
      <div class="overlay show" id="ov"><div class="box">
        <h2 id="ov-title">LUCKY SPIN</h2>
        <p id="ov-msg">Tragaperras de fichas (sin dinero real). <b>5 líneas de pago</b>: 3 símbolos iguales en cualquier línea pagan su multiplicador. 3× 7️⃣ = JACKPOT 💥. ¡Las combinaciones ganadoras se iluminan!</p>
        <button class="btn btn-accent" id="ov-btn">▶ Jugar</button>
      </div></div>
    </div>
    <div class="controls-row">
      <button class="btn" id="betdown">– Apuesta</button>
      <button class="btn btn-accent" id="spin">🎰 GIRAR</button>
      <button class="btn" id="betup">+ Apuesta</button>
      <button class="btn" id="reset">↻ Recargar</button>
    </div>
  </main>
  <script src="../../js/theme.js"></script>
  <script src="../../js/audio.js"></script>
  <script src="../../js/settings.js"></script>
  <script src="game.js"></script>
</body>
</html>
