<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soul Tale — NOVA ARCADE</title>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('nova-theme')||'dark')}catch(e){}</script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/theme.css">
<link rel="stylesheet" href="../../css/game.css">
<style>
  .rpg-acts { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .rpg-acts .btn { min-width:96px; }
  .rpg-acts .btn.sel { background:var(--accent); color:#06121f; box-shadow:0 0 14px color-mix(in srgb,var(--accent) 60%,transparent); }
</style>
</head>
<body>
  <div class="arcade-topbar">
    <a class="btn" href="../../index.html">← Volver</a>
    <span class="brand">SOUL TALE</span>
    <span class="spacer"></span>
    <div id="nova-gear-host"></div>
  </div>
  <main class="game-main">
    <div class="hud">
      <div class="stat"><b id="hp">20</b><span>HP</span></div>
      <div class="stat"><b id="lvl">1</b><span>Nivel</span></div>
      <div class="stat"><b id="gold">0</b><span>Oro</span></div>
    </div>
    <div class="stage">
      <canvas id="cv" width="600" height="380"></canvas>
      <div class="overlay show" id="ov"><div class="box">
        <h2 id="ov-title">SOUL TALE</h2>
        <p id="ov-msg">Un RPG narrativo. En tu turno elige acción. En el turno del enemigo, mueve tu ALMA (♥) con las flechas/WASD para esquivar. Puedes VENCER… o PERDONAR.</p>
        <button class="btn btn-accent" id="ov-btn">▶ Comenzar</button>
      </div></div>
    </div>
    <div class="rpg-acts" id="acts">
      <button class="btn sel" data-a="fight">⚔ LUCHAR</button>
      <button class="btn" data-a="act">💬 ACTUAR</button>
      <button class="btn" data-a="mercy">🕊 PIEDAD</button>
    </div>
  </main>
  <script src="../../js/theme.js"></script>
  <script src="../../js/audio.js"></script>
  <script src="../../js/settings.js"></script>
  <script src="game.js"></script>
</body>
</html>
